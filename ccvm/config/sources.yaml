sources:
  csv_futures_bootstrap:
    tier: manual_sample
    cadence: manual
    format: csv
    license_note: "Tier 0 fixture data for schema development and testing; never mixed with production records"

  cme_futures_settlement_example:
    tier: public_bootstrap
    cadence: daily
    expected_after: "18:00 America/Chicago"
    format: json
    endpoint_template: "https://www.cmegroup.com/CmeWS/mvc/Settlements/futures/tradeDate/{YYYYMMDD}/productCode/{PRODUCT_CODE}/code/fut/pageSize/50/isProtected"
    status: not_implemented
    note: "Product code and endpoint belong in config/markets/<product>.yaml"
    license_note: "prototype/manual verification; review CME terms before automated production use"

  cme_bulletin_option:
    tier: official_settlement
    cadence: daily
    expected_after: "18:00 America/Chicago"
    format: pdf_parsed_json
    pdf_path_template: "data/cme_bulletin/{YYYY-MM-DD}.pdf"
    note: "URL, product headers, strike scale, and month offset come from the product profile"
    collector_class: "ccvm.collectors.cme_bulletin_pdf.CMEBulletinPDFCollector"
    parser: "ccvm.parsers.bronze_options"
    normalizer: "ccvm.normalizers.silver_options"
    license_note: "CME Daily Bulletin — public settlement data; PDF must be saved manually before collect_day runs"

  cme_option_settlement_api_example:
    tier: public_bootstrap
    cadence: daily
    expected_after: "18:00 America/Chicago"
    format: json
    endpoint_template: "https://www.cmegroup.com/CmeWS/mvc/Settlements/options/tradeDate/{YYYYMMDD}/productCode/{OPTIONS_CODE}/code/OOF/pageSize/500/isProtected"
    status: not_implemented
    note: "Product code and endpoint belong in config/markets/<product>.yaml"
    license_note: "prototype/manual verification; review CME terms before automated production use"

  eia_api_v2:
    tier: official_open_api
    cadence: weekly_and_monthly
    requires_api_key: true
    base_url: "https://api.eia.gov/v2"
    license_note: "EIA Open Data — free for non-commercial and research use"

  cftc_cot:
    tier: official_open_file
    cadence: weekly
    format: csv_zip
    license_note: "CFTC public data"
