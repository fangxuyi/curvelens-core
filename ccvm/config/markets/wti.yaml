market:
  name: WTI Crude Oil
  exchange: NYMEX
  product_code: CL
  currency: USD
  price_unit: USD/BBL
  contract_multiplier: 1000
  tick_size: 0.01

  # Month letter codes for futures contracts
  month_codes:
    F: 1   # January
    G: 2   # February
    H: 3   # March
    J: 4   # April
    K: 5   # May
    M: 6   # June
    N: 7   # July
    Q: 8   # August
    U: 9   # September
    V: 10  # October
    X: 11  # November
    Z: 12  # December

  # Option parameters
  options:
    exercise_style: American
    settlement_style: Futures
    risk_free_rate: 0.05  # deployment assumption; update as rate policy evolves
    # LO option expiry = CL futures LTD − 3 business days (holiday-aware).
    # Futures LTD = 3 business days before the (adjusted) 25th of the month
    # prior to delivery. Source of truth: src/ccvm/reference/wti_calendar.py
    # (verified vs ICE WTI American options schedule; see tests/fixtures/).
    expiry_rule: "futures_ltd_minus_3_business_days"

  # MVP scope: first 8-12 monthly contracts
  futures_depth: 12
  # MVP scope: first 3-5 liquid expiries
  options_expiry_depth: 5
  min_strikes_per_expiry: 5
  warn_strikes_below: 5
  fail_strikes_below: 2

  # Quality thresholds
  max_daily_move_pct: 15.0  # warn if settlement moves more than this %
  settlement_min: 1.0
  settlement_max: 500.0

  # ── Product profile (E1): everything the code previously hardcoded ──
  display_name: "WTI"                    # used in report/dashboard copy
  futures_prefix: "CL"                   # contract codes: CL + month letter + yy
  options_prefix: "LO"                   # bulletin product + option symbols
  yfinance_contract_suffix: ".NYM"       # CLQ26.NYM
  calendar_module: "ccvm.reference.wti_calendar"   # expiry rules (E5 pattern)
  knowledge_pack: "wti"                  # knowledge/<pack>/
  fundamentals_provider: "eia_weekly_petroleum"    # E4 registry key

  bulletin:
    # CME daily bulletin parsing (Section 63 = Energy Options)
    product_header_call: "LO CALL"
    product_header_put: "LO PUT"
    url: "https://www.cmegroup.com/daily_bulletin/current/Section63_Energy_Options_Products.pdf"
    strike_scale: 100                    # strikes printed in cents: 6850 = $68.50
    underlying_month_offset: 1           # AUG26 label → CLU26 (next month) underlying

  benchmark:
    name: "Brent"
    ticker: "BZ=F"
    source_id: "yfinance_brent_front"
    filename_prefix: "brent_front"

  news:
    keywords:
      - crude
      - oil
      - wti
      - opec
      - petroleum
      - barrel
      - brent
      - refinery
      - refining
      - gasoline
      - cushing
      - lng
      - west texas
      - energy
      - pipeline
      - tanker
      - spr
      - iea
      - production cut
      - demand
      - supply
      - stockpile
      - inventory
      - nymex
      - commodity
      - saudi
      - russia
    sources:
      - key: eia_today_in_energy
        url: "https://www.eia.gov/rss/todayinenergy.xml"
        name: "EIA Today in Energy"
      - key: oilprice_com
        url: "https://oilprice.com/rss/main"
        name: "OilPrice.com"
      - key: cnbc_energy
        url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
        name: "CNBC Energy"
      - key: rigzone
        url: "https://www.rigzone.com/news/rss/rigzone_latest.aspx"
        name: "Rigzone"
      - key: offshore_technology
        url: "https://www.offshore-technology.com/feed/"
        name: "Offshore Technology"

  analysis:
    roles:
      - key: futures_curve
        display_name: Futures Curve Analyst
        mandate: Explain flat price, curve shape, carry, positioning, and the forward implications.
        section_keys: [what_changed, history_context, monitor, oi, cot, term_structure]
        news_keywords: [crude, oil, wti, brent, opec, tanker, pipeline, sanctions]
        required_checks:
          - Distinguish settled-market evidence from executable prices.
          - Check whether flat-price and curve signals agree or diverge.
      - key: vol_surface
        display_name: Volatility Surface Analyst
        mandate: Explain implied volatility, skew, term structure, and risk-neutral-density diagnostics.
        section_keys: [market_risk, rnd, term_structure]
        news_keywords: [crude, oil, volatility, options, opec, geopolitical, hurricane]
        required_checks:
          - Treat failed RND diagnostics as a limitation, never as probabilities.
          - Compare the surface move with realized price and event risk.
      - key: fundamentals
        display_name: Physical Fundamentals Analyst
        mandate: Explain inventories, balances, refining, supply, demand, and physical-market risks.
        section_keys: [fundamentals, eia_seasonal, agreement, scenarios]
        news_keywords: [inventory, stockpile, cushing, refinery, gasoline, production, demand, supply, opec, spr]
        required_checks:
          - Compare reported balances with the futures curve and price response.
          - Identify stale or missing releases before drawing a conclusion.

  cot:
    # CFTC Commitments of Traders, Disaggregated Fut+Opt Combined (kh3c-gbw2).
    contract_market_code: "067651"       # WTI-PHYSICAL, NYMEX
    contract_label: "WTI-PHYSICAL NYMEX"

  triggers:
    - id: bear_i_opec_cut
      scenario: bear
      side: invalidate
      kind: manual
      description: "OPEC+ announces emergency cut (agent judgment)"
      check: null
      params: {}

  caveats:
    - "expiry_convention_corrected_2026-07-10: LO option expiry now uses the exchange rule (futures LTD − 3 business days, holiday-aware) instead of a 3rd-Friday approximation; all IV/greeks history was restated"
