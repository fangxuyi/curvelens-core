market:
  name: WTI Crude Oil
  exchange: NYMEX
  product_code: CL
  currency: USD
  price_unit: USD/BBL
  contract_multiplier: 1000
  tick_size: 0.01

  # Month letter codes for futures contracts
  month_codes:
    F: 1   # January
    G: 2   # February
    H: 3   # March
    J: 4   # April
    K: 5   # May
    M: 6   # June
    N: 7   # July
    Q: 8   # August
    U: 9   # September
    V: 10  # October
    X: 11  # November
    Z: 12  # December

  # Option parameters
  options:
    exercise_style: American
    settlement_style: Futures
    # LO option expiry = CL futures LTD − 3 business days (holiday-aware).
    # Futures LTD = 3 business days before the (adjusted) 25th of the month
    # prior to delivery. Source of truth: src/ccvm/reference/wti_calendar.py
    # (verified vs ICE WTI American options schedule; see tests/fixtures/).
    expiry_rule: "futures_ltd_minus_3_business_days"

  # MVP scope: first 8-12 monthly contracts
  futures_depth: 12
  # MVP scope: first 3-5 liquid expiries
  options_expiry_depth: 5
  min_strikes_per_expiry: 5
  warn_strikes_below: 5
  fail_strikes_below: 3

  # Quality thresholds
  max_daily_move_pct: 15.0  # warn if settlement moves more than this %

  # ── Product profile (E1): everything the code previously hardcoded ──
  display_name: "WTI"                    # used in report/dashboard copy
  futures_prefix: "CL"                   # contract codes: CL + month letter + yy
  options_prefix: "LO"                   # bulletin product + option symbols
  yfinance_contract_suffix: ".NYM"       # CLQ26.NYM
  calendar_module: "ccvm.reference.wti_calendar"   # expiry rules (E5 pattern)
  knowledge_pack: "wti"                  # knowledge/<pack>/
  fundamentals_provider: "eia_weekly_petroleum"    # E4 registry key

  bulletin:
    # CME daily bulletin parsing (Section 63 = Energy Options)
    product_header_call: "LO CALL"
    product_header_put: "LO PUT"
    strike_scale: 100                    # strikes printed in cents: 6850 = $68.50
    underlying_month_offset: 1           # AUG26 label → CLU26 (next month) underlying
