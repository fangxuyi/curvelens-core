market:
  name: COMEX Gold
  display_name: Gold
  exchange: COMEX
  product_code: GC
  currency: USD
  price_unit: USD/OZT
  contract_multiplier: 100
  tick_size: 0.10

  month_codes:
    F: 1
    G: 2
    H: 3
    J: 4
    K: 5
    M: 6
    N: 7
    Q: 8
    U: 9
    V: 10
    X: 11
    Z: 12

  options:
    exercise_style: American
    settlement_style: Futures
    risk_free_rate: 0.05
    rnd_quality_gate: true
    premium_tick_size: 0.10
    # Permit convex projection only when every fitted premium stays within two
    # exchange ticks of the bulletin settlement. Raw diagnostics are retained.
    rnd_max_projection_ticks: 2.0
    expiry_rule: four_business_days_before_prior_month_end

  futures_depth: 12
  options_expiry_depth: 5
  warn_strikes_below: 5
  fail_strikes_below: 2
  settlement_min: 100
  settlement_max: 20000

  futures_prefix: GC
  options_prefix: OG
  yfinance_contract_suffix: .CMX
  calendar_module: ccvm.reference.gold_calendar
  knowledge_pack: gold

  bulletin:
    product_header_call: "OG CALL"
    product_header_put: "OG PUT"
    url: https://www.cmegroup.com/daily_bulletin/current/Section64_Metals_Option_Products.pdf
    strike_scale: 1
    expiry_basis: option_month
    # COMEX Rule 115101: serial option months exercise into the next even-month
    # future; e.g. JAN/FEB -> FEB and MAR/APR -> APR.
    underlying_month_map:
      1: 2
      2: 2
      3: 4
      4: 4
      5: 6
      6: 6
      7: 8
      8: 8
      9: 10
      10: 10
      11: 12
      12: 12

  cot:
    contract_market_code: "088691"
    contract_label: "GOLD COMEX"

  # Optional public macro capability. Collection uses the official FRED API
  # and skips cleanly when FRED_API_KEY is absent.
  macro:
    provider: fred
    api_key_env: FRED_API_KEY
    history_days: 400
    series:
      real_yield_10y:
        series_id: DFII10
        label: U.S. 10Y TIPS real yield
        units: percent
        role: opportunity_cost
        flat_price_sign: -1
      broad_usd:
        series_id: DTWEXBGS
        label: Nominal broad U.S. dollar index
        units: index
        role: currency
        flat_price_sign: -1
      breakeven_10y:
        series_id: T10YIE
        label: U.S. 10Y breakeven inflation
        units: percent
        role: inflation_compensation
        flat_price_sign: 1
      treasury_3m:
        series_id: DGS3MO
        label: U.S. 3-month Treasury yield
        units: percent
        role: financing_carry
        flat_price_sign: 0
      nominal_yield_10y:
        series_id: DGS10
        label: U.S. 10Y nominal Treasury yield
        units: percent
        role: rate_decomposition
        flat_price_sign: 0
      gold_volatility_proxy:
        series_id: GVZCLS
        label: CBOE Gold ETF Volatility Index
        units: index
        role: volatility_benchmark_proxy
        flat_price_sign: 0

  news:
    keywords:
      - gold
      - bullion
      - precious metals
      - comex
      - real yields
      - treasury yields
      - interest rate
      - rate cut
      - rate hike
      - federal reserve
      - fomc
      - monetary policy
      - economic outlook
      - discount rate
      - inflation
      - consumer price
      - producer price
      - personal income and outlays
      - gross domestic product
      - central bank
      - dollar
      - u.s. dollar
      - us dollar
      - geopolitical
      - sanctions
      - mining
    sources:
      # Use topic-specific official feeds rather than the Fed's combined press
      # feed, which is dominated by bank regulation and enforcement notices.
      - key: federal_reserve_monetary_policy
        url: https://www.federalreserve.gov/feeds/press_monetary.xml
        name: Federal Reserve Monetary Policy
      - key: federal_reserve_speeches
        url: https://www.federalreserve.gov/feeds/speeches.xml
        name: Federal Reserve Speeches
      - key: federal_reserve_testimony
        url: https://www.federalreserve.gov/feeds/testimony.xml
        name: Federal Reserve Testimony
      - key: bls_consumer_prices
        url: https://www.bls.gov/feed/cpi.rss
        name: BLS Consumer Price Index
      - key: bls_producer_prices
        url: https://www.bls.gov/feed/ppi.rss
        name: BLS Producer Price Index
      - key: bls_employment
        url: https://www.bls.gov/feed/empsit.rss
        name: BLS Employment Situation
      - key: bea_releases
        url: https://apps.bea.gov/rss/rss.xml
        name: BEA News Releases
      - key: cnbc_top_news
        url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
        name: CNBC Top News

  analysis:
    blocking_sections: [futures]
    retryable_empty_sections: [futures, options]
    max_quality_attempts: 2
    roles:
      - key: futures_curve
        display_name: Futures Curve Analyst
        mandate: Explain flat price, curve shape, carry, positioning, and the forward implications.
        section_keys: [what_changed, history_context, monitor, oi, cot, term_structure]
        news_keywords: [gold, bullion, precious metals, comex, central bank, mining, sanctions, geopolitical, dollar]
        minimum_key_metrics: 4
        report_requirements:
          - Report the front settlement and one-day dollar and percentage change.
          - Report at least two front-to-deferred curve spreads and annualized roll yield.
          - Compare with measured history when available and with applicable Gold knowledge-pack anchors when it is not.
          - Report managed-money positioning and its historical percentile when available.
        required_checks:
          - Distinguish settled-market evidence from executable prices.
          - Check whether flat-price and curve signals agree or diverge.
      - key: vol_surface
        display_name: Volatility Surface Analyst
        mandate: Explain implied volatility, skew, term structure, and risk-neutral-density diagnostics.
        section_keys: [market_risk, rnd, term_structure]
        news_keywords: [gold, precious metals, volatility, options, comex, fomc, inflation, geopolitical, treasury yields, interest rate]
        minimum_key_metrics: 5
        report_requirements:
          - Report front ATM implied volatility and its dated change when available.
          - Report 25-delta risk reversal and explain that negative means puts are more expensive than calls.
          - Report 25-delta butterfly and explain that it measures wing richness.
          - Report the front-to-second-expiry ATM volatility spread.
          - Compare OG measures with measured OG history; use GVZ only as a clearly labeled ETF-options proxy.
        required_checks:
          - Treat failed RND diagnostics as a limitation, never as probabilities.
          - Compare the surface move with realized price and event risk.
      - key: macro
        display_name: Macro Analyst
        mandate: Relate rates, real yields, the dollar, inflation, and policy risk to gold.
        section_keys: [macro, cot, what_changed]
        news_keywords: [gold, real yields, treasury yields, interest rate, rate cut, rate hike, federal reserve, fomc, monetary policy, economic outlook, discount rate, inflation, consumer price, producer price, personal income and outlays, gross domestic product, dollar, central bank, sanctions, geopolitical]
        minimum_key_metrics: 4
        report_requirements:
          - Report the latest real yield, broad dollar, breakeven, and nominal yield with dates and changes.
          - Report the GVZ volatility proxy level and historical percentile when available, labeling it as an ETF-options proxy rather than OG implied volatility.
          - Name the most relevant verified macro news, its date, and why it matters; state plainly when no relevant item was collected.
          - Compare the macro signals with the gold settlement, curve, and option-skew evidence.
        required_checks:
          - Separate observed macro moves from causal interpretation.
          - State whether macro evidence supports or conflicts with market internals.

  caveats:
    - "Gold has no physical-fundamentals provider; its optional macro context is reported separately and does not enter the agreement classifier"
    - "The Yahoo individual-contract suffix .CMX is a bootstrap-feed assumption and must be verified during the first live collection day"
