market:
  name: CME E-mini Russell 2000
  display_name: Russell 2000
  exchange: CME
  product_code: RTY
  currency: USD
  price_unit: USD/INDEX_POINT
  contract_multiplier: 50
  tick_size: 0.10
  month_codes: {H: 3, M: 6, U: 9, Z: 12}
  listed_futures_months: [3, 6, 9, 12]
  options:
    exercise_style: American
    settlement_style: Futures
    risk_free_rate: 0.05
    rnd_quality_gate: true
    premium_tick_size: 0.05
    rnd_max_fit_residual_ticks: 2.0
    expiry_rule: quarterly_third_friday
  futures_depth: 4
  options_expiry_depth: 4
  options_expiry_horizon_months: 12
  warn_strikes_below: 8
  fail_strikes_below: 3
  settlement_min: 100
  settlement_max: 20000
  futures_prefix: RTY
  options_prefix: RTO
  yfinance_contract_suffix: ""
  calendar_module: ccvm.reference.equity_index_calendar
  knowledge_pack: russell2000
  market_data:
    provider: authorized_files
    input_subdir: authorized_market_data
    futures_filename: futures.json
    options_filename: options.json
    credentials_env: []
  equity_context:
    proxy_ticker: IWM
    proxy_name: iShares Russell 2000 ETF
    sector_proxies: {XLC: Communication Services, XLY: Consumer Discretionary, XLP: Consumer Staples, XLE: Energy, XLF: Financials, XLV: Health Care, XLI: Industrials, XLB: Materials, XLRE: Real Estate, XLK: Information Technology, XLU: Utilities}
    earnings_provider: alphavantage
    earnings_api_key_env: ALPHAVANTAGE_API_KEY
    sec_user_agent_env: SEC_USER_AGENT
    history_days: 45
    company_watchlist:
      - {ticker: SOFI, name: SoFi Technologies, cik: "0001818874"}
      - {ticker: RIVN, name: Rivian Automotive, cik: "0001874178"}
      - {ticker: RKLB, name: Rocket Lab USA, cik: "0001819994"}
      - {ticker: IONQ, name: IonQ, cik: "0001824920"}
      - {ticker: JOBY, name: Joby Aviation, cik: "0001819848"}
  macro:
    provider: fred
    api_key_env: FRED_API_KEY
    history_days: 800
    series:
      treasury_2y: {series_id: DGS2, label: U.S. 2-year Treasury yield, units: percent, role: policy_rate, flat_price_sign: -1}
      treasury_10y: {series_id: DGS10, label: U.S. 10-year Treasury yield, units: percent, role: discount_rate, flat_price_sign: -1}
      high_yield_spread: {series_id: BAMLH0A0HYM2, label: U.S. high-yield option-adjusted spread, units: percent, role: credit_conditions, flat_price_sign: -1}
      bank_lending: {series_id: DRTSCILM, label: Banks tightening C&I standards for medium and large firms, units: net percent, role: credit_availability, flat_price_sign: -1}
      vix: {series_id: VIXCLS, label: CBOE VIX close, units: index, role: stress, flat_price_sign: -1}
      financial_conditions: {series_id: STLFSI4, label: St. Louis Fed Financial Stress Index, units: index, role: financial_conditions, flat_price_sign: -1}
  news:
    keywords: [russell 2000, russell, rty, iwm, small cap, regional bank, credit, lending, refinancing, earnings, guidance, merger, acquisition, federal reserve, inflation, jobs]
    sources:
      - {key: sec_press, url: "https://www.sec.gov/news/pressreleases.rss", name: SEC Press Releases}
      - {key: federal_reserve_speeches, url: "https://www.federalreserve.gov/feeds/speeches.xml", name: Federal Reserve Speeches}
      - {key: bls_releases, url: "https://www.bls.gov/feed/bls_latest.rss", name: BLS Latest Releases}
      - {key: bea_releases, url: "https://apps.bea.gov/rss/rss.xml", name: BEA News Releases}
      - {key: cnbc_markets, url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114", name: CNBC Markets}
      - {key: yahoo_finance, url: "https://finance.yahoo.com/news/rssindex", name: Yahoo Finance}
  analysis:
    blocking_sections: [futures]
    retryable_empty_sections: [futures, options, equity_context]
    max_quality_attempts: 2
    roles:
      - key: index_market
        display_name: Small-Cap Market and Basis Analyst
        mandate: Explain Russell 2000 settlement, quarterly basis, breadth, cyclicality, and forward implications.
        section_keys: [what_changed, history_context, monitor, oi, term_structure, equity_context]
        news_keywords: [russell 2000, rty, iwm, small cap, breadth, sector, regional bank, credit]
        minimum_key_metrics: 5
        report_requirements:
          - Report the front RTY settlement and one-day point and percentage change.
          - Report quarterly futures spreads as financing/dividend basis.
          - Report IWM context and top and bottom three sector ETF returns.
          - Compare current measures with dated local history.
        required_checks:
          - Never interpret index curve shape as inventory scarcity.
          - Distinguish official CME settlements from ETF adjusted-close context.
      - key: vol_surface
        display_name: Small-Cap Volatility Analyst
        mandate: Explain RTY option volatility, downside skew, term structure, and risk-neutral probabilities.
        section_keys: [market_risk, rnd, term_structure, history_context]
        news_keywords: [volatility, options, vix, credit, earnings, federal reserve, regional bank]
        minimum_key_metrics: 5
        report_requirements:
          - Report ATM IV, 25-delta risk reversal, butterfly, and IV term spread.
          - Report valid RND probabilities by expiry and every failed expiry.
          - Compare implied with realized volatility and dated history.
        required_checks:
          - Treat RND as risk-neutral pricing probabilities, not forecasts.
          - Treat failed diagnostics only as limitations.
      - key: macro_credit
        display_name: Small-Cap Macro and Credit Analyst
        mandate: Explain policy rates, credit spreads, bank lending, domestic growth, and refinancing conditions for smaller companies.
        section_keys: [macro, what_changed, term_structure, equity_context]
        news_keywords: [federal reserve, credit, lending, bank, refinancing, inflation, jobs, gdp, small business]
        minimum_key_metrics: 5
        report_requirements:
          - Report 2-year and 10-year yields, high-yield spread, lending standards, VIX, and stress observations with dates.
          - Compare financing evidence with RTY price, basis, sector leadership, and skew.
        required_checks:
          - Preserve release dates and distinguish quarterly lending surveys from same-day prices.
          - Do not assume all Russell companies have the same leverage or refinancing exposure.
      - key: sectors_corporate
        display_name: Small-Cap Sectors, Earnings, and Corporate Events Analyst
        mandate: Explain sector leadership and selected small-cap earnings, filings, financing, M&A, and corporate actions.
        section_keys: [equity_context, catalysts, what_changed]
        news_keywords: [earnings, guidance, financing, refinancing, offering, buyback, merger, acquisition, dividend, split, 8-k, regional bank]
        minimum_key_metrics: 4
        report_requirements:
          - Report top and bottom three broad sector proxy returns.
          - Name upcoming watched earnings and recent watched SEC filings.
          - Explain whether corporate and financing evidence confirms or conflicts with RTY.
        required_checks:
          - Do not claim the broad sector panel is exact Russell 2000 attribution.
          - Do not claim the selected small-cap watchlist is current full index membership.
  caveats:
    - "Bootstrap supports quarterly RTY futures/options only; daily, weekly, serial, and end-of-month option families are excluded"
    - "IWM and sector ETF adjusted closes are contextual and not synchronized with official CME settlements"
    - "The selected company watchlist is a bounded event lens, not authoritative current Russell 2000 membership"
